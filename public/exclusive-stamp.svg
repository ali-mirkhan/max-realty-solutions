<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="goldInk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E5B649"/>
      <stop offset="100%" stop-color="#A87410"/>
    </linearGradient>
    <pattern id="inkTexture" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#FFFFFF"/>
      <circle cx="12" cy="18" r="2" fill="#000000"/>
      <circle cx="35" cy="42" r="1.5" fill="#000000"/>
      <circle cx="68" cy="22" r="2.2" fill="#000000"/>
      <circle cx="82" cy="55" r="1.8" fill="#000000"/>
      <circle cx="22" cy="74" r="1.6" fill="#000000"/>
      <circle cx="55" cy="88" r="2" fill="#000000"/>
      <circle cx="92" cy="78" r="1.4" fill="#000000"/>
      <circle cx="48" cy="15" r="1.3" fill="#000000"/>
      <circle cx="75" cy="92" r="1.7" fill="#000000"/>
      <circle cx="8" cy="55" r="1.5" fill="#000000"/>
    </pattern>
    <mask id="distressMask">
      <rect width="500" height="350" fill="white"/>
      <rect width="500" height="350" fill="url(#inkTexture)"/>
    </mask>
  </defs>
  <g transform="rotate(-8 250 175)" mask="url(#distressMask)">
    <rect x="60" y="105" width="380" height="140" fill="none" stroke="url(#goldInk)" stroke-width="6"/>
    <rect x="72" y="117" width="356" height="116" fill="none" stroke="url(#goldInk)" stroke-width="2"/>
    <text x="250" y="200" font-family="Impact, 'Arial Black', sans-serif" font-size="78" font-weight="900" letter-spacing="8" fill="url(#goldInk)" text-anchor="middle">EXCLUSIVE</text>
  </g>
</svg>
